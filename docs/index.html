<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>duck :O</title>
</head>
<body>
<h1 id="duck1"></h1>
<h1 id="duck2"></h1>
<h1 id="duck3"></h1>
<script>
  var duckplace = 2;
  document.querySelector("#duck2").innerHTML="🦆"
    document.querySelector("#duck1").innerHTML="🟡"
    document.querySelector("#duck3").innerHTML="🟡"
  document.addEventListener('keydown', (event) => {
    if (event.key === "ArrowUp"){
      if (duckplace === 2){
        document.querySelector("#duck2").innerHTML="🟡"
        document.querySelector("#duck1").innerHTML="🦆"
        duckplace = 1
      } else if (duckplace === 3){
        document.querySelector("#duck3").innerHTML="🟡"
        document.querySelector("#duck2").innerHTML="🦆"
        duckplace = 2
      }
    } else if (event.key === "ArrowDown"){
      if (duckplace === 1){
        document.querySelector("#duck1").innerHTML="🟡"
        document.querySelector("#duck2").innerHTML="🦆"
        duckplace = 2
      } else if (duckplace === 2){
        document.querySelector("#duck2").innerHTML="🟡"
        document.querySelector("#duck3").innerHTML="🦆"
        duckplace = 3
      }
    }
  });
</script>
</body>
</html>

<body tabindex="0">
<h1 id="duck1"> </h1>
<h1 id="duck2"> </h1>
<h1 id="duck3"> </h1>
<script>
 var duckplace = 2;
   document.querySelector("#duck2").innerHTML="🦆"
  document.addEventListener('keydown', (event) => {
    if (event.key === "ArrowUp" && duckplace === 2){
      document.querySelector("#duck2").innerHTML=" "
      document.querySelector("#duck1").innerHTML="🦆"
      duckplace = 1
    } else if ( event.key === "ArrowUp" && duckplace === 3){
      document.querySelector("#duck3").innerHTML=" "
      document.querySelector("#duck2").innerHTML="🦆"
      duckplace = 2
    } else if ( event.key === "ArrowDown" && duckplace === 2){
      document.querySelector("#duck2").innerHTML=" "
      document.querySelector("#duck3").innerHTML="🦆"
      duckplace = 3
    } else if ( event.key === "ArrowDown" && duckplace === 1){
      document.querySelector("#duck1").innerHTML=" "
      document.querySelector("#duck2").innerHTML="🦆"
      duckplace = 2
    };
  };
</script>
